# PII scanning on outgoing messages (true/false)
policy.enforce.PII=true
# Block the request when PII is detected; false = warn only (true/false)
policy.enforce.PII.block_on_detect=true
# Comma-separated list of entity types that trigger blocking.
# Other entities (LOCATION, DATE_TIME, URL) will only produce warnings.
policy.enforce.PII.block_entities=PERSON,EMAIL_ADDRESS,PHONE_NUMBER,CREDIT_CARD,US_SSN,US_BANK_NUMBER,IBAN_CODE
# MCP tool availability and selection logging (true/false)
policy.enforce.allowedMCP=true
